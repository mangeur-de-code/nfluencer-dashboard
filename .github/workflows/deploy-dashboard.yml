# Deploy Dashboard
name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: ['src/**', 'public/**', 'index.html', 'package.json', 'package-lock.json', 'vite.config.ts', 'tailwind.config.ts']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Dashboard to Cloudflare Pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build
        env:
          VITE_ADMIN_API_BASE_URL: https://fanzzer-admin.dlouis20.workers.dev
          VITE_MAIN_APP_URL: https://www.fanzzer.com
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_DOMAIN: fanzzer.com

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name fanzzer-dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Test deployment
        run: |
          sleep 15
          curl -f "https://main.fanzzer-dashboard.pages.dev" || exit 1