name: Deploy Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare Pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build dashboard
        run: npm run build
        env:
          # Clerk publishable key (safe to expose — it's a public key)
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          # Admin microservice URL (e.g. https://api-admin.nfluencer.co)
          VITE_API_BASE_URL: https://api-admin.nfluencer.co
          VITE_MAIN_APP_URL: https://www.nfluencer.co
          VITE_DOMAIN: nfluencer.co

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nfluencer-dashboard --compatibility-date=2025-09-01