# fanzzer-dashboard — Cloudflare Pages
#
# Standalone admin dashboard SPA.
# After first deploy, add custom domain in Cloudflare dashboard:
# Pages → fanzzer-dashboard → Custom Domains → dashboard.fanzzer.com

name = "fanzzer-dashboard"
pages_build_output_dir = "dist"
compatibility_date = "2025-09-01"

[env.production.vars]
VITE_ADMIN_API_BASE_URL = "https://fanzzer-admin.dlouis20.workers.dev"
VITE_MAIN_APP_URL = "https://www.fanzzer.com"
VITE_CLERK_PUBLISHABLE_KEY = "pk_test_fake_key_for_demo"
VITE_DOMAIN = "fanzzer.co"
CLOUDFLARE_ACCOUNT_ID = "your_account_id"
CLOUDFLARE_API_TOKEN = "your_api_token"
RESEND_API_KEY = "your_resend_key"

# Preview environment variables (for testing)
[env.preview.vars]
VITE_ADMIN_API_BASE_URL = "https://fanzzer-admin.dlouis20.workers.dev"
VITE_MAIN_APP_URL = "https://www.fanzzer.com"
VITE_DASHBOARD_API_KEY = "dev-key-123"
VITE_DOMAIN = "fanzzer.co"